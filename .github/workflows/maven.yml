# PR builds:
#   Unit, Integration, Performance — all in parallel with fail-fast
#   (if unit tests fail at ~5 min, integration + performance are cancelled)
#
# Push builds (master):
#   Full Kafka version matrix (3.1.0, 3.7.0, 3.9.1 + experimental 4.x)

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── PR Builds ──────────────────────────────────────────────────────────

  # All test suites in parallel — fail-fast cancels the rest if any fails
  test:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        include:
          - suite: unit
            name: "Unit Tests"
            cmd: "./mvnw --batch-mode -Pci test -Dlicense.skip -Dexcluded.groups=performance -Dsurefire.rerunFailingTestsCount=2"
          - suite: integration
            name: "Integration Tests"
            cmd: "./mvnw --batch-mode -Pci verify -DskipUTs=true -Dlicense.skip -Dexcluded.groups=performance -Dsurefire.rerunFailingTestsCount=2"
          - suite: performance
            name: "Performance Tests"
            cmd: "bin/performance-test.sh"
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          flags: ${{ matrix.suite }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Push Builds (master) ───────────────────────────────────────────────

  # Full Kafka version matrix as safety net
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        ak: [ 3.1.0, 3.7.0, 3.9.1 ]
        experimental: [ false ]
        name: [ "Stable" ]
        include:
          - ak: "'[3.9.1,5)'"
            experimental: true
            name: "Newest AK (4.x?)"
    continue-on-error: ${{ matrix.experimental }}
    name: "AK: ${{ matrix.ak }} (${{ matrix.name }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and Test
        run: bin/ci-build.sh ${{ matrix.ak }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          flags: ak-${{ matrix.ak }}
          token: ${{ secrets.CODECOV_TOKEN }}
