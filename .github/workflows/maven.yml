# Tiered CI: fast feedback first, expensive tests only after cheap ones pass.
#
# PR builds:
#   Tier 1: Unit tests (no Docker, ~3 min)
#   Tier 2: Integration tests (TestContainers, ~10 min) — waits for Tier 1
#   Tier 3: Kafka version matrix (2.8.1 + 3.9.1) — waits for Tier 2
#   Tier 4: Performance tests (@Tag("performance")) — waits for Tier 2
#
# Push builds (master):
#   Full Kafka version matrix (2.8.1, 3.1.0, 3.7.0, 3.9.1 + experimental 4.x)

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── PR Builds ──────────────────────────────────────────────────────────

  # Tier 1: Unit tests — fast feedback, no Docker needed
  unit-tests:
    if: github.event_name == 'pull_request'
    name: "Tier 1: Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Unit tests (no Docker)
        run: ./mvnw --batch-mode test -Dlicense.skip -Dexcluded.groups=performance

  # Tier 2: Integration tests — needs Docker/TestContainers
  integration-tests:
    if: github.event_name == 'pull_request'
    needs: unit-tests
    name: "Tier 2: Integration Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Integration tests (TestContainers)
        run: ./mvnw --batch-mode verify -Dlicense.skip -Dexcluded.groups=performance

  # Tier 3: Kafka version matrix — oldest and newest supported versions
  kafka-matrix:
    if: github.event_name == 'pull_request'
    needs: integration-tests
    strategy:
      fail-fast: false
      matrix:
        ak: [ 2.8.1, 3.9.1 ]
    name: "Tier 3: AK ${{ matrix.ak }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test with Kafka ${{ matrix.ak }}
        run: bin/ci-build.sh ${{ matrix.ak }}

  # Tier 4: Performance tests — long-running volume/load tests
  performance-tests:
    if: github.event_name == 'pull_request'
    needs: integration-tests
    name: "Tier 4: Performance Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Performance tests
        run: ./mvnw --batch-mode verify -Dlicense.skip -Dincluded.groups=performance -Dexcluded.groups=

  # ── Push Builds (master) ───────────────────────────────────────────────

  # Full Kafka version matrix as safety net
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        ak: [ 2.8.1, 3.1.0, 3.7.0, 3.9.1 ]
        experimental: [ false ]
        name: [ "Stable" ]
        include:
          - ak: "'[3.9.1,5)'"
            experimental: true
            name: "Newest AK (4.x?)"
    continue-on-error: ${{ matrix.experimental }}
    name: "AK: ${{ matrix.ak }} (${{ matrix.name }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and Test
        run: bin/ci-build.sh ${{ matrix.ak }}
