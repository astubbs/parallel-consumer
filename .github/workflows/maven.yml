# PR builds:
#   1. Build & Test: full verify (unit + integration), default Kafka version
#   2. Kafka Matrix (2.8.1 + 3.9.1) + Performance tests — fan out after Build & Test
#
# Push builds (master):
#   Full Kafka version matrix (2.8.1, 3.1.0, 3.7.0, 3.9.1 + experimental 4.x)

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── PR Builds ──────────────────────────────────────────────────────────

  # Full build and test — unit + integration, default Kafka version
  build-and-test:
    if: github.event_name == 'pull_request'
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and verify (unit + integration)
        run: ./mvnw --batch-mode verify -Dlicense.skip -Dexcluded.groups=performance -Dsurefire.rerunFailingTestsCount=2

  # Kafka version matrix — oldest and newest supported versions
  kafka-matrix:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        ak: [ 2.8.1, 3.9.1 ]
    name: "AK ${{ matrix.ak }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and test with Kafka ${{ matrix.ak }}
        run: bin/ci-build.sh ${{ matrix.ak }}

  # Performance tests — volume/load tests that may uncover bugs at scale
  performance-tests:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    name: "Performance Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Performance tests
        run: ./mvnw --batch-mode verify -Dlicense.skip -Dincluded.groups=performance -Dexcluded.groups= -Dsurefire.rerunFailingTestsCount=2

  # ── Push Builds (master) ───────────────────────────────────────────────

  # Full Kafka version matrix as safety net
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        ak: [ 2.8.1, 3.1.0, 3.7.0, 3.9.1 ]
        experimental: [ false ]
        name: [ "Stable" ]
        include:
          - ak: "'[3.9.1,5)'"
            experimental: true
            name: "Newest AK (4.x?)"
    continue-on-error: ${{ matrix.experimental }}
    name: "AK: ${{ matrix.ak }} (${{ matrix.name }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and Test
        run: bin/ci-build.sh ${{ matrix.ak }}
