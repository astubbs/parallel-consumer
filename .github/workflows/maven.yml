# PR builds:
#   Unit, Integration, Performance - all in parallel with fail-fast
#   (if unit tests fail at ~5 min, integration + performance are cancelled)
#
# Push builds (master):
#   Full Kafka version matrix (3.1.0, 3.7.0, 3.9.1 + experimental 4.x)

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── PR Builds ──────────────────────────────────────────────────────────

  # All test suites in parallel -fail-fast cancels the rest if any fails
  test:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        include:
          - suite: unit
            name: "Unit Tests"
            cmd: "bin/ci-unit-test.sh"
          - suite: integration
            name: "Integration Tests"
            cmd: "bin/ci-integration-test.sh"
          - suite: performance
            name: "Performance Tests"
            cmd: "bin/performance-test.sh"
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml,**/target/site/jacoco-it/jacoco.xml'
          flags: ${{ matrix.suite }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # Duplicate code detection using both PMD CPD and jscpd engines.
  # Both are fast (~15s each) and give different perspectives - PMD CPD
  # understands Java syntax, jscpd is language-agnostic token matching.
  # Results are combined into one PR comment for cross-validation.
  duplicate-detection:
    if: github.event_name == 'pull_request'
    name: "Duplicate Code Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PMD_VERSION: '7.9.0'
      CPD_MIN_TOKENS: '70'
      CPD_DIRS: 'parallel-consumer-core/src parallel-consumer-vertx/src parallel-consumer-reactor/src parallel-consumer-mutiny/src'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install PMD
        run: |
          wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip"
          unzip -q "pmd-dist-${PMD_VERSION}-bin.zip"
          echo "$PWD/pmd-bin-${PMD_VERSION}/bin" >> $GITHUB_PATH
      - name: Run both engines on base branch
        run: |
          git checkout ${{ github.event.pull_request.base.sha }} --quiet 2>/dev/null || true
          pmd cpd --dir $CPD_DIRS --language java --minimum-tokens $CPD_MIN_TOKENS --format xml > cpd-base.xml 2>/dev/null || true
          npx jscpd@4 --pattern "**/*.java" --ignore "**/target/**,**/node_modules/**" --reporters json --output jscpd-base --min-lines 6 --min-tokens 70 2>/dev/null || true
          git checkout ${{ github.sha }} --quiet
      - name: Run both engines on PR branch
        run: |
          pmd cpd --dir $CPD_DIRS --language java --minimum-tokens $CPD_MIN_TOKENS --format xml > cpd-pr.xml || true
          npx jscpd@4 --pattern "**/*.java" --ignore "**/target/**,**/node_modules/**" --reporters consoleFull,json --output jscpd-report --min-lines 6 --min-tokens 70 || true
      - name: Install xml2js
        run: npm install --no-save xml2js
      - name: Post combined duplicate report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { analyzeAndReport } = require('./bin/ci-duplicate-report.js');
            await analyzeAndReport({
              github, context, core,
              prXmlPath: 'cpd-pr.xml',
              baseXmlPath: 'cpd-base.xml',
              prJscpdPath: 'jscpd-report/jscpd-report.json',
              baseJscpdPath: 'jscpd-base/jscpd-report.json'
            });

  # File similarity detection - finds files that are semantically similar overall
  file-similarity:
    if: github.event_name == 'pull_request'
    name: "File Similarity Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astubbs/duplicate-code-detection-tool@feat/base-vs-pr-comparison
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directories: 'parallel-consumer-core/src,parallel-consumer-vertx/src,parallel-consumer-reactor/src,parallel-consumer-mutiny/src'
          file_extensions: 'java'
          ignore_below: 30
          fail_above: 80
          warn_above: 50
          one_comment: true
          compare_with_base: true
          max_increase: 10

  # SpotBugs static analysis -finds null derefs, concurrency issues, resource leaks
  spotbugs:
    if: github.event_name == 'pull_request'
    name: "SpotBugs"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Compile and run SpotBugs
        run: ./mvnw --batch-mode -Pci compile spotbugs:spotbugs -Dlicense.skip -pl parallel-consumer-core -am
      - name: Post SpotBugs annotations on PR
        if: always()
        uses: jwgmeligmeyling/spotbugs-github-action@v1.2
        with:
          path: '**/target/spotbugsXml.xml'
          token: ${{ secrets.GITHUB_TOKEN }}

  # Dependency vulnerability scanning -GitHub's own dependency review
  dependency-scan:
    if: github.event_name == 'pull_request'
    name: "Dependency Vulnerabilities"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # Mutation testing (PIT) -verifies test assertions are meaningful
  mutation-testing:
    if: github.event_name == 'pull_request'
    name: "Mutation Testing (PIT)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Run PIT mutation testing
        run: ./mvnw --batch-mode -Pci test-compile org.pitest:pitest-maven:mutationCoverage -Dlicense.skip -DtargetClasses="io.confluent.parallelconsumer.*" -DtargetTests="io.confluent.parallelconsumer.*" -Dthreads=4 -pl parallel-consumer-core -am
        continue-on-error: true
      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: '**/target/pit-reports/**'
      - name: Post PIT summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const files = execSync('find . -path "*/pit-reports/*/mutations.csv" -type f').toString().trim().split('\n').filter(f => f);
            if (files.length === 0) { console.log('No PIT report found'); return; }
            let killed = 0, survived = 0, noCov = 0, total = 0;
            for (const f of files) {
              const lines = fs.readFileSync(f, 'utf8').split('\n').filter(l => l.trim());
              for (const line of lines) {
                total++;
                if (line.includes('KILLED')) killed++;
                else if (line.includes('SURVIVED')) survived++;
                else if (line.includes('NO_COVERAGE')) noCov++;
              }
            }
            const score = total > 0 ? ((killed / total) * 100).toFixed(1) : '0';
            let body = `## Mutation Testing (PIT) Report\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Mutations generated | ${total} |\n`;
            body += `| Killed (detected) | ${killed} |\n`;
            body += `| Survived (missed) | ${survived} |\n`;
            body += `| No coverage | ${noCov} |\n`;
            body += `| **Mutation score** | **${score}%** |\n\n`;
            body += `Full HTML report available as artifact: \`pit-report\`\n`;
            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.data.find(c => c.body.includes('## Mutation Testing (PIT) Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  # ── Push Builds (master) ───────────────────────────────────────────────

  # Full Kafka version matrix as safety net
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        ak: [ 3.1.0, 3.7.0, 3.9.1 ]
        experimental: [ false ]
        name: [ "Stable" ]
        include:
          - ak: "'[3.9.1,5)'"
            experimental: true
            name: "Newest AK (4.x?)"
    continue-on-error: ${{ matrix.experimental }}
    name: "AK: ${{ matrix.ak }} (${{ matrix.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and Test
        run: bin/ci-build.sh ${{ matrix.ak }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml,**/target/site/jacoco-it/jacoco.xml'
          flags: ak-${{ matrix.ak }}
          token: ${{ secrets.CODECOV_TOKEN }}
