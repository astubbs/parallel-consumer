# PR builds:
#   Unit, Integration, Performance - all in parallel with fail-fast
#   (if unit tests fail at ~5 min, integration + performance are cancelled)
#
# Push builds (master):
#   Full Kafka version matrix (3.1.0, 3.7.0, 3.9.1 + experimental 4.x)

name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # ── PR Builds ──────────────────────────────────────────────────────────

  # All test suites in parallel -fail-fast cancels the rest if any fails
  test:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: true
      matrix:
        include:
          - suite: unit
            name: "Unit Tests"
            cmd: "bin/ci-unit-test.sh"
          - suite: integration
            name: "Integration Tests"
            cmd: "bin/ci-integration-test.sh"
          - suite: performance
            name: "Performance Tests"
            cmd: "bin/performance-test.sh"
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml,**/target/site/jacoco-it/jacoco.xml'
          flags: ${{ matrix.suite }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # Duplicate code detection - runs in parallel with tests
  # Compares PR vs base branch and fails if duplication exceeds 3%
  duplicate-detection:
    if: github.event_name == 'pull_request'
    name: "Duplicate Code Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run jscpd on base branch
        run: |
          git checkout ${{ github.event.pull_request.base.sha }} --quiet 2>/dev/null || true
          npx jscpd@4 --pattern "**/*.java" --ignore "**/target/**,**/node_modules/**" --reporters json --output jscpd-base --min-lines 6 --min-tokens 70 2>/dev/null || true
          git checkout ${{ github.sha }} --quiet
      - name: Run jscpd on PR branch
        run: npx jscpd@4 --pattern "**/*.java" --ignore "**/target/**,**/node_modules/**" --reporters consoleFull,json --output jscpd-report --min-lines 6 --min-tokens 70 --threshold 3
      - name: Post duplicate report and annotate new clones
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { loadReport, findNewClones, buildComment, MAX_PCT, MAX_PCT_INCREASE } = require('./bin/ci-duplicate-report.js');
            const prReport = loadReport('jscpd-report/jscpd-report.json');
            if (!prReport) { console.log('No PR report found'); return; }
            const baseReport = loadReport('jscpd-base/jscpd-report.json');
            const prStats = prReport.statistics.total;
            const baseStats = baseReport ? baseReport.statistics.total : null;
            const pct = parseFloat(prStats.percentage);
            const pctDelta = baseStats ? pct - parseFloat(baseStats.percentage) : 0;
            const pctFail = pct > MAX_PCT;
            const increaseFail = baseStats && pctDelta > MAX_PCT_INCREASE;
            const shouldFail = pctFail || increaseFail;
            const newClones = findNewClones(prReport, baseReport);
            const body = buildComment(prReport, baseReport, newClones, shouldFail, pctFail, increaseFail, pctDelta);
            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.data.find(c => c.body.includes('Duplicate Code Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
            // Annotate new clones as PR review comments
            if (newClones.length > 0) {
              const { data: files } = await github.rest.pulls.listFiles({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number });
              const changedFiles = new Set(files.map(f => f.filename));
              for (const d of newClones.slice(0, 10)) {
                const f1 = d.firstFile.name.replace(/^.*parallel-consumer\//, '');
                const f2 = d.secondFile.name.replace(/^.*parallel-consumer\//, '');
                // Only annotate files that are part of this PR's diff
                for (const [file, line, other, otherLine] of [
                  [f1, d.firstFile.startLoc.line, f2, d.secondFile.startLoc.line],
                  [f2, d.secondFile.startLoc.line, f1, d.firstFile.startLoc.line]
                ]) {
                  if (changedFiles.has(file)) {
                    try {
                      await github.rest.pulls.createReviewComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.issue.number,
                        commit_id: context.sha,
                        path: file,
                        line: parseInt(line),
                        body: `:warning: **Duplicate code detected** - ${d.lines} lines duplicated with \`${other}:${otherLine}\``
                      });
                    } catch (e) {
                      console.log(`Could not annotate ${file}:${line} - ${e.message}`);
                    }
                    break;
                  }
                }
              }
            }
            if (shouldFail) {
              core.setFailed('Duplicate code check failed - see PR comment for details');
            }

  # File similarity detection - finds files that are semantically similar overall
  file-similarity:
    if: github.event_name == 'pull_request'
    name: "File Similarity Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astubbs/duplicate-code-detection-tool@feat/base-vs-pr-comparison
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          directories: 'parallel-consumer-core/src,parallel-consumer-vertx/src,parallel-consumer-reactor/src,parallel-consumer-mutiny/src'
          file_extensions: 'java'
          ignore_below: 30
          fail_above: 80
          warn_above: 50
          one_comment: true
          compare_with_base: true
          max_increase: 10

  # SpotBugs static analysis -finds null derefs, concurrency issues, resource leaks
  spotbugs:
    if: github.event_name == 'pull_request'
    name: "SpotBugs"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Compile and run SpotBugs
        run: ./mvnw --batch-mode -Pci compile spotbugs:spotbugs -Dlicense.skip -pl parallel-consumer-core -am
      - name: Post SpotBugs annotations on PR
        if: always()
        uses: jwgmeligmeyling/spotbugs-github-action@v1.2
        with:
          path: '**/target/spotbugsXml.xml'
          token: ${{ secrets.GITHUB_TOKEN }}

  # Dependency vulnerability scanning -GitHub's own dependency review
  dependency-scan:
    if: github.event_name == 'pull_request'
    name: "Dependency Vulnerabilities"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # Mutation testing (PIT) -verifies test assertions are meaningful
  mutation-testing:
    if: github.event_name == 'pull_request'
    name: "Mutation Testing (PIT)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Run PIT mutation testing
        run: ./mvnw --batch-mode -Pci test-compile org.pitest:pitest-maven:mutationCoverage -Dlicense.skip -DtargetClasses="io.confluent.parallelconsumer.*" -DtargetTests="io.confluent.parallelconsumer.*" -Dthreads=4 -pl parallel-consumer-core -am
        continue-on-error: true
      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: '**/target/pit-reports/**'
      - name: Post PIT summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const files = execSync('find . -path "*/pit-reports/*/mutations.csv" -type f').toString().trim().split('\n').filter(f => f);
            if (files.length === 0) { console.log('No PIT report found'); return; }
            let killed = 0, survived = 0, noCov = 0, total = 0;
            for (const f of files) {
              const lines = fs.readFileSync(f, 'utf8').split('\n').filter(l => l.trim());
              for (const line of lines) {
                total++;
                if (line.includes('KILLED')) killed++;
                else if (line.includes('SURVIVED')) survived++;
                else if (line.includes('NO_COVERAGE')) noCov++;
              }
            }
            const score = total > 0 ? ((killed / total) * 100).toFixed(1) : '0';
            let body = `## Mutation Testing (PIT) Report\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Mutations generated | ${total} |\n`;
            body += `| Killed (detected) | ${killed} |\n`;
            body += `| Survived (missed) | ${survived} |\n`;
            body += `| No coverage | ${noCov} |\n`;
            body += `| **Mutation score** | **${score}%** |\n\n`;
            body += `Full HTML report available as artifact: \`pit-report\`\n`;
            const comments = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.data.find(c => c.body.includes('## Mutation Testing (PIT) Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  # ── Push Builds (master) ───────────────────────────────────────────────

  # Full Kafka version matrix as safety net
  build:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        ak: [ 3.1.0, 3.7.0, 3.9.1 ]
        experimental: [ false ]
        name: [ "Stable" ]
        include:
          - ak: "'[3.9.1,5)'"
            experimental: true
            name: "Newest AK (4.x?)"
    continue-on-error: ${{ matrix.experimental }}
    name: "AK: ${{ matrix.ak }} (${{ matrix.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - name: Build and Test
        run: bin/ci-build.sh ${{ matrix.ak }}
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: '**/target/site/jacoco/jacoco.xml,**/target/site/jacoco-it/jacoco.xml'
          flags: ak-${{ matrix.ak }}
          token: ${{ secrets.CODECOV_TOKEN }}
